<div class="container mt-5">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Work Logs</h1>

    <button class="btn btn-primary" type="button" (click)="openAddWorkLog()">
      Add Work Log
    </button>
  </div>

  <!-- Filters -->
  <div class="d-flex align-items-end gap-3 mb-4 flex-wrap">

    <div>
      <label class="form-label">Work Date</label>
      <input class="form-control"
             type="date"
             [(ngModel)]="selectedDate">
    </div>

    <div>
      <label class="form-label">Project</label>
      <select class="form-select"
              [(ngModel)]="selectedProjectId">

        <option [value]="0">All Projects</option>

        <option *ngFor="let project of projects"
                [value]="project.id">
          {{ project.name }}
        </option>

      </select>
    </div>

    <div style="min-width:250px;">
      <label class="form-label">Search</label>
      <input class="form-control"
             type="text"
             placeholder="Ticket or Description"
             [(ngModel)]="searchText">
    </div>

    <div>
      <button class="btn btn-outline-primary me-2"
              type="button"
              (click)="applyProjectFilter()">
        Search
      </button>

      <button class="btn btn-outline-secondary"
              type="button"
              (click)="clearDateFilter()">
        Clear
      </button>
    </div>

  </div>

  <div *ngIf="isLoading" class="alert alert-info">
    Loading work logs...
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">
    {{ errorMessage }}
  </div>

  <table class="table table-striped" *ngIf="!isLoading">
    <thead>
      <tr>
        <th role="button" (click)="sortBy('workDate')">Date</th>
        <th role="button" (click)="sortBy('projectName')">Project</th>
        <th role="button" (click)="sortBy('ticketNumber')">Ticket</th>
        <th role="button" (click)="sortBy('taskType')">Task Type</th>
        <th role="button" (click)="sortBy('description')">Description</th>
        <th role="button" (click)="sortBy('hoursWorked')">Hours</th>
        <th style="width:160px;">Actions</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let workLog of filteredWorkLogs">
        <td>{{ workLog.workDate }}</td>
        <td>{{ workLog.projectName }}</td>
        <td>{{ workLog.ticketNumber }}</td>
        <td>{{ workLog.taskType }}</td>
        <td>{{ workLog.description }}</td>
        <td>{{ workLog.hoursWorked }}</td>
        <td>
          <button class="btn btn-sm btn-outline-primary me-2"
                  type="button"
                  (click)="openEditWorkLog(workLog)">
            Edit
          </button>

          <button class="btn btn-sm btn-outline-danger"
                  type="button"
                  (click)="deleteWorkLog(workLog)">
            Delete
          </button>
        </td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="!isLoading && filteredWorkLogs.length === 0"
       class="alert alert-warning">
    No work logs found for selected filters.
  </div>

</div>
