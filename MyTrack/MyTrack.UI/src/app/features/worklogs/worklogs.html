<div class="container mt-5">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Work Logs</h1>

    <button class="btn btn-primary" type="button" (click)="openAddWorkLog()">
      Add Work Log
    </button>
  </div>

  <div *ngIf="isLoading" class="alert alert-info">
    Loading work logs...
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">
    {{ errorMessage }}
  </div>

  <table class="table table-striped" *ngIf="!isLoading">
    <thead>
      <tr>
        <th>Date</th>
        <th>Project</th>
        <th>Ticket</th>
        <th>Task Type</th>
        <th>Description</th>
        <th>Hours</th>
        <th style="width: 160px;">Actions</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let workLog of workLogs">
        <td>{{ workLog.workDate }}</td>
        <td>{{ workLog.projectName }}</td>
        <td>{{ workLog.ticketNumber }}</td>
        <td>{{ workLog.taskType }}</td>
        <td>{{ workLog.description }}</td>
        <td>{{ workLog.hoursWorked }}</td>
        <td>
          <button class="btn btn-sm btn-outline-primary me-2"
                  type="button"
                  (click)="openEditWorkLog(workLog)">
            Edit
          </button>

          <button class="btn btn-sm btn-outline-danger"
                  type="button"
                  (click)="deleteWorkLog(workLog)">
            Delete
          </button>
        </td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="!isLoading && workLogs.length === 0" class="alert alert-warning">
    No work logs found for today.
  </div>

</div>
