<h2 mat-dialog-title>
  Print Work Log Report
</h2>

<mat-dialog-content>

  <p class="text-muted mb-4">
    Select the report criteria and click <strong>Generate Report</strong> to preview and print the work log report.
  </p>

  <div class="mb-3">
    <label class="form-label">
      Report Range
    </label>

    <select class="form-select"
            [(ngModel)]="selectedRange">

      <option value="today">Today</option>
      <option value="week">This Week</option>
      <option value="15days">Last 15 Days</option>
      <option value="month">This Month</option>
      <option value="year">This Year</option>
      <option value="custom">Custom Date Range</option>
      <option value="all">All Work Logs</option>

    </select>
  </div>

  <div class="row" *ngIf="selectedRange === 'custom'">

    <div class="col-md-6 mb-3">

      <label class="form-label">
        Start Date
      </label>

      <input class="form-control"
             type="date"
             [(ngModel)]="customStartDate">

    </div>

    <div class="col-md-6 mb-3">

      <label class="form-label">
        End Date
      </label>

      <input class="form-control"
             type="date"
             [(ngModel)]="customEndDate">

    </div>

  </div>

  <div class="mb-3">

    <label class="form-label">
      Project
    </label>

    <select class="form-select"
            [(ngModel)]="selectedProjectId">

      <option [value]="0">
        All Projects
      </option>

      <option *ngFor="let project of projects"
              [value]="project.id">
        {{ project.name }}
      </option>

    </select>

  </div>

</mat-dialog-content>

<mat-dialog-actions align="end">

  <button mat-button
          type="button"
          (click)="cancel()">
    Cancel
  </button>

  <button mat-flat-button
          color="primary"
          type="button"
          (click)="print()">
    Generate Report
  </button>

</mat-dialog-actions>
