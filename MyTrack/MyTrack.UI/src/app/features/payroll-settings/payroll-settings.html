<h2 mat-dialog-title>
  Payroll Settings
</h2>

<mat-dialog-content>

  <p class="text-muted mb-4">
    Configure the default tax percentages used to calculate employee take-home pay.
  </p>

  <div *ngIf="isLoading" class="alert alert-info">
    Loading payroll settings...
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">
    {{ errorMessage }}
  </div>

  <div class="row">

    <div class="col-md-6 mb-3">
      <label class="form-label">Federal Tax (%)</label>
      <input class="form-control" type="number" [(ngModel)]="federalTaxPercent" step="0.01">
    </div>

    <div class="col-md-6 mb-3">
      <label class="form-label">State Tax (%)</label>
      <input class="form-control" type="number" [(ngModel)]="stateTaxPercent" step="0.01">
    </div>

    <div class="col-md-6 mb-3">
      <label class="form-label">Social Security (%)</label>
      <input class="form-control" type="number" [(ngModel)]="socialSecurityTaxPercent" step="0.01">
    </div>

    <div class="col-md-6 mb-3">
      <label class="form-label">Medicare (%)</label>
      <input class="form-control" type="number" [(ngModel)]="medicareTaxPercent" step="0.01">
    </div>

  </div>

</mat-dialog-content>

<mat-dialog-actions align="end">

  <button mat-button type="button" (click)="cancel()">
    Cancel
  </button>

  <button mat-flat-button color="primary" type="button" (click)="save()">
    Save
  </button>

</mat-dialog-actions>
