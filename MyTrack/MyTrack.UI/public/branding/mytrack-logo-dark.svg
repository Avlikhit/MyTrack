<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" role="img" aria-labelledby="title description">

  <title id="title">MyTrack dark-background logo</title>

  <desc id="description">
    MyTrack logo designed for a dark background.
  </desc>

  <rect width="600" height="180" rx="22" fill="#0F172A"></rect>

  <defs>
    <linearGradient id="mytrackBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"></stop>
      <stop offset="100%" stop-color="#2563EB"></stop>
    </linearGradient>
  </defs>

  <g transform="translate(18, 14) scale(0.9)">
    <path d="
