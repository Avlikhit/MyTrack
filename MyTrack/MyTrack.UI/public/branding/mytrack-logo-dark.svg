    <path d="
      M 91 94
      L 108 111
      L 142 69" fill="none" stroke="#10B981" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"></path>

    <circle cx="130" cy="48" r="6" fill="#10B981"></circle>
    <circle cx="142" cy="33" r="5" fill="#10B981"></circle>
    <circle cx="151" cy="18" r="4" fill="#10B981"></circle>
